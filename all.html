<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:-apple-system, system-ui, sans-serif;
}

/* camera container */

#view{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
display:block;
}

/* eyes */

.eye{
position:absolute;
top:0;
bottom:0;
width:50%;
overflow:hidden;
padding-left:4vw;
padding-right:4vw;
box-sizing:border-box;
}

#leftEye{ left:0; }
#rightEye{ right:0; display:none; }

/* camera video */

video{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
height:200vh;
width:auto;
filter:contrast(1.35) brightness(1.25);
}

/* zoom bar */

#zoomBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.7);
padding:20px;
}

#zoom{
width:100%;
height:40px;
}

/* menu button */

#menuButton{
position:fixed;
top:20px;
right:20px;
font-size:28px;
color:white;
background:rgba(0,0,0,0.6);
width:60px;
height:60px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

/* menu overlay */

#menu{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:black;
color:white;
display:none;
}

/* large spaced buttons */

.menuButton{
position:absolute;
font-size:22px;
padding:22px;
border-radius:16px;
border:none;
background:#2c7be5;
color:white;
}

/* corners */

#vrToggle{ top:40px; left:40px; }
#distToggle{ top:40px; right:40px; }

#contrastToggle{ bottom:40px; left:40px; }
#closeMenu{ bottom:40px; right:40px; background:#aa3333; }

/* centre */

#reset{
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

</style>

</head>

<body>

<div id="view">

<div id="leftEye" class="eye">
<video id="leftVideo" autoplay playsinline></video>
</div>

<div id="rightEye" class="eye">
<video id="rightVideo" autoplay playsinline></video>
</div>

</div>

<div id="menuButton">☰</div>

<div id="zoomBar">
<input id="zoom" type="range" min="150" max="400" value="200">
</div>

<div id="menu">

<button id="vrToggle" class="menuButton">VR Mode OFF</button>

<button id="distToggle" class="menuButton">Lens Distortion OFF</button>

<button id="contrastToggle" class="menuButton">High Contrast ON</button>

<button id="reset" class="menuButton">Reset View</button>

<button id="closeMenu" class="menuButton">Close ✕</button>

</div>

<script>

const leftVideo = document.getElementById("leftVideo")
const rightVideo = document.getElementById("rightVideo")

const leftEye = document.getElementById("leftEye")
const rightEye = document.getElementById("rightEye")

let vrMode = false
let distortion = false
let contrast = true

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{ideal:"environment"},
width:{ideal:1920},
height:{ideal:1080},
focusMode:"continuous"
},

audio:false

})

leftVideo.srcObject = stream
rightVideo.srcObject = stream

}

startCamera()

/* zoom */

const zoom = document.getElementById("zoom")

zoom.oninput=()=>{

const size = zoom.value + "vh"

leftVideo.style.height = size
rightVideo.style.height = size

}

/* menu */

const menu = document.getElementById("menu")

document.getElementById("menuButton").onclick=()=>{
menu.style.display="block"
}

document.getElementById("closeMenu").onclick=()=>{
menu.style.display="none"
}

/* VR toggle */

document.getElementById("vrToggle").onclick=function(){

vrMode=!vrMode

if(vrMode){

rightEye.style.display="block"
leftEye.style.width="50%"
rightEye.style.width="50%"

this.textContent="VR Mode ON"

}else{

rightEye.style.display="none"
leftEye.style.width="100%"

this.textContent="VR Mode OFF"

}

}

/* distortion */

document.getElementById("distToggle").onclick=function(){

distortion=!distortion

if(distortion){

leftVideo.style.borderRadius="40%"
rightVideo.style.borderRadius="40%"

this.textContent="Lens Distortion ON"

}else{

leftVideo.style.borderRadius="0"

rightVideo.style.borderRadius="0"

this.textContent="Lens Distortion OFF"

}

}

/* contrast */

document.getElementById("contrastToggle").onclick=function(){

contrast=!contrast

if(contrast){

leftVideo.style.filter="contrast(1.35) brightness(1.25)"
rightVideo.style.filter="contrast(1.35) brightness(1.25)"

this.textContent="High Contrast ON"

}else{

leftVideo.style.filter="contrast(1) brightness(1)"
rightVideo.style.filter="contrast(1) brightness(1)"

this.textContent="High Contrast OFF"

}

}

/* reset */

document.getElementById("reset").onclick=()=>{

zoom.value=200

leftVideo.style.height="200vh"
rightVideo.style.height="200vh"

}

</script>

</body>
</html>
