<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:-apple-system,system-ui,sans-serif;
}

/* camera container */

#view{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
}

/* eye containers */

.eye{
position:absolute;
top:0;
bottom:0;
overflow:hidden;
box-sizing:border-box;
}

#leftEye{
left:0;
width:100%;
}

#rightEye{
right:0;
width:50%;
display:none;
}

/* video */

video{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
height:200vh;
width:auto;
filter:contrast(1.35) brightness(1.25);
}

/* zoom bar */

#zoomBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.7);
padding:20px;
color:white;
}

#zoomBar input[type=range]{
width:100%;
}

/* menu button */

#menuButton{
position:fixed;
top:20px;
right:20px;
font-size:28px;
color:white;
background:rgba(0,0,0,0.6);
width:60px;
height:60px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

/* menu overlay */

#menu{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:black;
color:white;
display:none;
}

/* buttons */

.menuButton{
position:absolute;
font-size:22px;
padding:22px;
border-radius:16px;
border:none;
background:#2c7be5;
color:white;
}

#vrToggle{ top:40px; left:40px; }
#contrastToggle{ bottom:40px; left:40px; }
#closeMenu{ bottom:40px; right:40px; background:#aa3333; }

/* IPD control */

#ipdBox{
position:absolute;
top:40px;
right:40px;
width:220px;
}

#ipdBox input{
width:100%;
}

#ipdValue{
width:80px;
font-size:18px;
margin-top:10px;
}

</style>

</head>

<body>

<div id="view">

<div id="leftEye" class="eye">
<video id="leftVideo" autoplay playsinline></video>
</div>

<div id="rightEye" class="eye">
<video id="rightVideo" autoplay playsinline></video>
</div>

</div>

<div id="menuButton">☰</div>

<div id="zoomBar">

<label>Zoom</label>
<input id="zoom" type="range" min="150" max="400" value="200">

<input id="zoomValue" type="number" min="150" max="400" value="200">

</div>

<div id="menu">

<button id="vrToggle" class="menuButton">VR Mode OFF</button>

<div id="ipdBox">

<label>IPD (mm)</label>

<input id="ipd" type="range" min="50" max="75" value="63">

<input id="ipdValue" type="number" min="50" max="75" value="63">

</div>

<button id="contrastToggle" class="menuButton">High Contrast ON</button>

<button id="closeMenu" class="menuButton">Close ✕</button>

</div>

<script>

const leftVideo=document.getElementById("leftVideo")
const rightVideo=document.getElementById("rightVideo")

const leftEye=document.getElementById("leftEye")
const rightEye=document.getElementById("rightEye")

let vrMode=false
let contrast=true

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{ideal:"environment"},
width:{ideal:1920},
height:{ideal:1080},
focusMode:"continuous"
},

audio:false

})

leftVideo.srcObject=stream
rightVideo.srcObject=stream

}

startCamera()

/* zoom */

const zoom=document.getElementById("zoom")
const zoomValue=document.getElementById("zoomValue")

function applyZoom(v){

const size=v+"vh"

leftVideo.style.height=size
rightVideo.style.height=size

zoom.value=v
zoomValue.value=v

}

zoom.oninput=()=>applyZoom(zoom.value)

zoomValue.oninput=()=>applyZoom(zoomValue.value)

/* menu */

const menu=document.getElementById("menu")

document.getElementById("menuButton").onclick=()=>{
menu.style.display="block"
}

document.getElementById("closeMenu").onclick=()=>{
menu.style.display="none"
}

/* VR toggle */

document.getElementById("vrToggle").onclick=function(){

vrMode=!vrMode

if(vrMode){

rightEye.style.display="block"
leftEye.style.width="50%"

this.textContent="VR Mode ON"

applyIPD(ipd.value)

}else{

rightEye.style.display="none"
leftEye.style.width="100%"

this.textContent="VR Mode OFF"

}

}

/* contrast */

document.getElementById("contrastToggle").onclick=function(){

contrast=!contrast

if(contrast){

leftVideo.style.filter="contrast(1.35) brightness(1.25)"
rightVideo.style.filter="contrast(1.35) brightness(1.25)"

this.textContent="High Contrast ON"

}else{

leftVideo.style.filter="contrast(1) brightness(1)"
rightVideo.style.filter="contrast(1) brightness(1)"

this.textContent="High Contrast OFF"

}

}

/* IPD */

const ipd=document.getElementById("ipd")
const ipdValue=document.getElementById("ipdValue")

function applyIPD(v){

ipd.value=v
ipdValue.value=v

const offset=(v-63)*0.5

leftVideo.style.transform=
`translate(calc(-50% - ${offset}px),-50%)`

rightVideo.style.transform=
`translate(calc(-50% + ${offset}px),-50%)`

}

ipd.oninput=()=>applyIPD(ipd.value)

ipdValue.oninput=()=>applyIPD(ipdValue.value)

</script>

</body>
</html>
