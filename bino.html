<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

video{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
height:150vh;

filter:
contrast(1.4)
brightness(1.2);

}

#overlay{

position:fixed;
top:0;
left:0;
right:0;
bottom:0;

pointer-events:none;

background:
radial-gradient(circle at 25% 50%, transparent 40%, black 41%),
radial-gradient(circle at 75% 50%, transparent 40%, black 41%);

opacity:0.7;

}

#controls{

position:fixed;
bottom:0;
left:0;
right:0;

background:rgba(0,0,0,0.8);
color:white;
padding:15px;

}

label{
display:block;
margin-top:8px;
}

</style>

</head>

<body>

<video id="cam" autoplay playsinline></video>

<div id="overlay"></div>

<div id="controls">

<label>
Zoom
<input id="zoom" type="range" min="120" max="500" value="200">
</label>

<label>
Stabilisation
<input id="smooth" type="range" min="1" max="20" value="10">
</label>

</div>

<script>

const video = document.getElementById("cam")

async function start(){

const stream = await navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment",
width:{ideal:1920},
height:{ideal:1080}
},

audio:false

})

video.srcObject = stream

}

start()


const zoom = document.getElementById("zoom")

zoom.oninput=()=>{

video.style.height = zoom.value + "vh"

}

</script>

</body>
</html>
