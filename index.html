<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
touch-action:manipulation;
}

body{
background:black;
overflow:hidden;
font-family:-apple-system,system-ui,sans-serif;
}

/* camera */

#view{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
overflow:hidden;
}

video{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
height:100vh;
width:auto;
image-rendering:-webkit-optimize-contrast;
filter:contrast(1.35) brightness(1.2);
}

/* menu toggle */

#menuButton{
position:fixed;
top:3vh;
right:3vw;
width:12vw;
height:10vw;
max-width:120px;
max-height:90px;
border-radius:2vw;
background:rgba(0,0,0,0.6);
color:white;
font-size:4vw;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
}

/* resume style */

.resume{
background:#1faa3c !important;
color:white;
}

/* menu */

#menu{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:black;
display:none;
}

/* zoom buttons */

#levels{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
width:95vw;
display:flex;
gap:1vw;
}

.level{
flex:1;
height:20vh;
background:white;
border-radius:1vw;
display:flex;
align-items:center;
justify-content:center;
font-size:5vw;
font-weight:bold;
}

.level.active{
background:#2c7be5;
color:white;
}

/* reload button */

#reloadButton{
position:absolute;
bottom:4vh;
left:3vw;
padding:2vh 3vw;
font-size:4vw;
border-radius:1vw;
border:none;
background:#d92c2c;
color:white;
font-weight:bold;
}

/* mode selector */

#modeRow{
position:absolute;
bottom:4vh;
right:3vw;
display:flex;
align-items:center;
gap:2vw;
color:white;
font-size:4vw;
}

select{
font-size:4vw;
padding:1.5vh 2vw;
border-radius:1vw;
}

</style>
</head>

<body>

<div id="view">
<video id="camera" autoplay playsinline></video>
</div>

<div id="menuButton">☰</div>

<div id="menu">

<button id="reloadButton">Reload</button>

<div id="levels"></div>

<div id="modeRow">
<div>Mode:</div>
<select id="modeSelect">
<option value="normal">Default</option>
<option value="invert">Invert</option>
<option value="mono">Mono</option>
<option value="contrast1">Contrast 1</option>
<option value="contrast2">Contrast 2</option>
</select>
</div>

</div>

<script>

const video=document.getElementById("camera")
const menu=document.getElementById("menu")
const menuButton=document.getElementById("menuButton")
const modeSelect=document.getElementById("modeSelect")

let mode="normal"
let dynamicBrightness=1.2

/* start camera */

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{ ideal:"environment" },
width:{ ideal:3840 },
height:{ ideal:2160 },
frameRate:{ ideal:30, max:30 },
focusMode:"continuous",
stabilizationMode:"continuous"
},

audio:false

})

video.srcObject=stream

}

startCamera()

/* zoom */

const zoomValues=[100,115,130,150,175,200,230,260,300,340,380]

const levels=document.getElementById("levels")

function setZoom(i){

document.querySelectorAll(".level").forEach((el,index)=>{
if(index<=i) el.classList.add("active")
else el.classList.remove("active")
})

video.style.height=zoomValues[i]+"vh"

}

zoomValues.forEach((z,i)=>{
const b=document.createElement("div")
b.className="level"
b.textContent=i
b.onclick=()=>setZoom(i)
levels.appendChild(b)
})

setZoom(0)

/* filters */

function applyFilters(){

let filter=""

if(mode==="normal")
filter=`contrast(1.35) brightness(${dynamicBrightness})`

if(mode==="invert")
filter=`invert(1) contrast(1.35) brightness(${dynamicBrightness})`

if(mode==="mono")
filter=`grayscale(1) contrast(1.5) brightness(${dynamicBrightness})`

if(mode==="contrast1")
filter=`contrast(2.4) brightness(${dynamicBrightness+0.15})`

if(mode==="contrast2")
filter=`grayscale(0.4) contrast(3.0) brightness(${dynamicBrightness+0.2})`

video.style.filter=filter

}

modeSelect.onchange=()=>{
mode=modeSelect.value
applyFilters()
}

/* brightness detection */

const probeCanvas=document.createElement("canvas")
const probeCtx=probeCanvas.getContext("2d")

probeCanvas.width=32
probeCanvas.height=32

function analyseBrightness(){

if(video.readyState<2) return

probeCtx.drawImage(video,0,0,32,32)

let data=probeCtx.getImageData(0,0,32,32).data

let total=0

for(let i=0;i<data.length;i+=4){

let luminance=(data[i]*0.2126)+(data[i+1]*0.7152)+(data[i+2]*0.0722)
total+=luminance

}

let avg=total/(data.length/4)

if(avg<60) dynamicBrightness=1.6
else if(avg<90) dynamicBrightness=1.4
else if(avg<120) dynamicBrightness=1.3
else dynamicBrightness=1.2

applyFilters()

}

setInterval(analyseBrightness,500)

/* menu toggle */

menuButton.onclick=()=>{

const open=menu.style.display==="block"

if(open){

menu.style.display="none"
menuButton.textContent="☰"
menuButton.classList.remove("resume")

}else{

menu.style.display="block"
menuButton.textContent="Resume"
menuButton.classList.add("resume")

}

}

/* reload button */

document.getElementById("reloadButton").onclick=()=>{

const url=new URL(window.location.href)

url.searchParams.set("reload",Date.now())

window.location.href=url.toString()

}

/* block gesture zoom */

["gesturestart","gesturechange","gestureend"].forEach(e=>{
document.addEventListener(e,function(ev){ev.preventDefault()})
})

applyFilters()

</script>

</body>
</html>
