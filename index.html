<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
}

body{
background:black;
overflow:hidden;
font-family:-apple-system,system-ui,sans-serif;
}

/* camera */

#view{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
overflow:hidden;
}

video{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
height:200vh;
width:auto;
filter:contrast(1.35) brightness(1.25);
}

/* menu button */

#menuButton{
position:fixed;
top:20px;
right:20px;
width:60px;
height:60px;
border-radius:12px;
background:rgba(0,0,0,0.6);
color:white;
font-size:28px;
display:flex;
align-items:center;
justify-content:center;
}

/* menu */

#menu{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:black;
display:none;
}

/* magnification buttons */

#levels{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:12px;
padding:20px;
}

.level{
width:60px;
height:120px;
background:white;
border-radius:10px;
}

/* selected */

.level.active{
background:#2c7be5;
}

/* close button */

#closeMenu{
position:absolute;
bottom:40px;
right:40px;
padding:20px 30px;
font-size:22px;
background:#aa3333;
color:white;
border:none;
border-radius:14px;
}

</style>

</head>

<body>

<div id="view">
<video id="camera" autoplay playsinline></video>
</div>

<div id="menuButton">☰</div>

<div id="menu">

<div id="levels"></div>

<button id="closeMenu">Close ✕</button>

</div>

<script>

const video=document.getElementById("camera")

async function startCamera(){

const stream=await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{ideal:"environment"},
width:{ideal:1920},
height:{ideal:1080},
focusMode:"continuous"
},

audio:false

})

video.srcObject=stream

}

startCamera()

/* zoom levels */

const levels=document.getElementById("levels")

const zoomValues=[150,170,190,210,230,260,290,320,360,400]

zoomValues.forEach((z,i)=>{

const b=document.createElement("div")

b.className="level"

b.onclick=()=>{

document.querySelectorAll(".level").forEach((el,index)=>{

if(index<=i) el.classList.add("active")
else el.classList.remove("active")

})

video.style.height=z+"vh"

}

levels.appendChild(b)

})

/* menu */

const menu=document.getElementById("menu")

document.getElementById("menuButton").onclick=()=>{
menu.style.display="block"
}

document.getElementById("closeMenu").onclick=()=>{
menu.style.display="none"
}

</script>

</body>
</html>
