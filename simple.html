<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>

body{
margin:0;
background:black;
overflow:hidden;
}

#vr{
display:flex;
width:100vw;
height:100vh;
}

.eye{
width:50vw;
height:100vh;
overflow:hidden;
position:relative;
}

video{
position:absolute;
height:120vh;
left:-10vw;
top:-10vh;
filter:contrast(1.05);
}

#ui{
position:fixed;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
color:white;
font-family:sans-serif;
font-size:14px;
}

label{
display:block;
margin-top:5px;
}

</style>
</head>

<body>

<div id="vr">
<div class="eye"><video id="left" autoplay playsinline></video></div>
<div class="eye"><video id="right" autoplay playsinline></video></div>
</div>

<div id="ui">
<label>IPD <input id="ipd" type="range" min="-50" max="50" value="0"></label>
<label>Zoom <input id="zoom" type="range" min="100" max="160" value="120"></label>
</div>

<script>

const left = document.getElementById("left")
const right = document.getElementById("right")

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"},
audio:false
})

left.srcObject = stream
right.srcObject = stream

}

startCamera()

const ipd = document.getElementById("ipd")
const zoom = document.getElementById("zoom")

function update(){

const offset = ipd.value

left.style.transform = `translateX(${offset}px)`
right.style.transform = `translateX(${-offset}px)`

const z = zoom.value

left.style.height = z + "vh"
right.style.height = z + "vh"

}

ipd.oninput = update
zoom.oninput = update

</script>

</body>
</html>
