<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
}

#vr{
display:flex;
width:100vw;
height:100vh;
}

.eye{
width:50vw;
height:100vh;
overflow:hidden;
position:relative;
}

video{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
height:200vh;

filter:
contrast(1.3)
brightness(1.2)
saturate(1.2);

}

#controls{

position:fixed;
bottom:0;
left:0;
right:0;

background:rgba(0,0,0,0.7);
padding:15px;

color:white;
font-size:16px;

}

label{
display:block;
margin-top:8px;
}

</style>
</head>

<body>

<div id="vr">

<div class="eye">
<video id="left" autoplay playsinline></video>
</div>

<div class="eye">
<video id="right" autoplay playsinline></video>
</div>

</div>

<div id="controls">

<label>
Zoom
<input id="zoom" type="range" min="150" max="400" value="200">
</label>

<label>
Eye spacing
<input id="ipd" type="range" min="-120" max="120" value="0">
</label>

<label>
Contrast
<input id="contrast" type="range" min="100" max="200" value="130">
</label>

</div>

<script>

const left = document.getElementById("left")
const right = document.getElementById("right")

async function start(){

const stream = await navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment",
width:{ideal:1920},
height:{ideal:1080}
},

audio:false

})

left.srcObject = stream
right.srcObject = stream

}

start()


const zoom = document.getElementById("zoom")
const ipd = document.getElementById("ipd")
const contrast = document.getElementById("contrast")

function update(){

const z = zoom.value

left.style.height = z + "vh"
right.style.height = z + "vh"

const offset = ipd.value

left.style.transform =
`translate(calc(-50% + ${offset}px),-50%)`

right.style.transform =
`translate(calc(-50% - ${offset}px),-50%)`

const c = contrast.value

left.style.filter =
`contrast(${c/100}) brightness(1.2)`

right.style.filter =
`contrast(${c/100}) brightness(1.2)`

}

zoom.oninput = update
ipd.oninput = update
contrast.oninput = update

</script>

</body>
</html>
